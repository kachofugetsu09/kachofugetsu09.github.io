        <p>希尔排序是一种分组插入排序算法。<br>首先取一个整数d1=n/2,将元素分为d1个组，每组相邻元素之间距离为d1，再各组内进行插入排序<br>取第二个整数d2=d1/2,重复上述分组排序过程，直到di=1<br>代码实现<br><figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">def</span> <span class="title function_">insert_sort_gap</span>(<span class="params">li,gap</span>):</span><br><span class="line">    <span class="keyword">for</span> i <span class="keyword">in</span> <span class="built_in">range</span>(gap,<span class="built_in">len</span>(li)):</span><br><span class="line">        tmp=li[i]</span><br><span class="line">        j=i-gap</span><br><span class="line">    <span class="keyword">while</span> j&gt;=<span class="number">0</span> <span class="keyword">and</span> li[j]&gt;tmp:</span><br><span class="line">        li[j+gap]=li[j]</span><br><span class="line">        j-=gap</span><br><span class="line">        li[j+gap]= tmp</span><br><span class="line"></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">shell_sort</span>(<span class="params">li</span>):</span><br><span class="line">    d=shell_sort(li):</span><br><span class="line">    <span class="keyword">while</span> d&gt;=<span class="number">1</span>:</span><br><span class="line">        insert_sort_gap(li,d)</span><br><span class="line">        d//<span class="number">2</span></span><br></pre></td></tr></table></figure></p>
