<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类 - 花月的技术博客</title>
    
    <link rel="icon" href="img/logo.jpg" type="image/jpeg">
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- 不蒜子访问统计（只统计不显示） -->
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <span id="busuanzi_container_site_pv" style="display: none;"><span id="busuanzi_value_site_pv">0</span></span>
    
    <script src="assets/js/config.js"></script>
    <script src="assets/js/main.js"></script>
</head>
<body>
    <!-- 统一头部区域 -->
    <header class="site-header">
        <div class="header-content">
            <div class="header-left">
                <div class="site-logo">
                    <img src="img/logo.jpg" alt="网站Logo" class="logo-image">
                </div>
                <div class="site-info">
                    <h1 class="site-title">花月的技术博客</h1>
                    <p class="site-description">Folding was never an option.</p>
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容区域 -->
    <div class="main-container">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <ul class="sidebar-categories" id="sidebarCategories">
                    <!-- 分类将通过JavaScript动态生成 -->
                </ul>
            </nav>
        </aside>

        <div class="content-wrapper">
            <div class="content-layout">
                <div class="category-container">
                    <div id="categoryContent">
                        <!-- 分类内容将在这里动态加载 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2025 花月的技术博客. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
