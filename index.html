<!DOCTYPE html>
<html lang="zh-CN">
<head>    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花月的技术博客</title>    <link rel="icon" href="img/logo.jpg" type="image/jpeg">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/links.css">
    <link rel="stylesheet" href="assets/css/transitions.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- 添加Markdown解析和语法高亮支持 -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/lib/marked.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <!-- 添加Mermaid支持 -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({
            startOnLoad: true,
            theme: 'default',
            flowchart: {
                useMaxWidth: true,
                htmlLabels: true
            }
        });
    </script>
    
    <!-- 添加数学公式支持 -->
    <script>
    window.MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']],
            processEscapes: true
        },
        svg: {
            fontCache: 'global'
        },
        startup: {
            typeset: false
        }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- 不蒜子访问统计 -->
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
      <script src="assets/js/config.js"></script>
    <script src="assets/js/url-utils.js"></script>
    <script src="assets/js/main.js"></script>
</head>
<body>    <!-- 统一头部区域 -->
    <header class="site-header">
        <div class="header-content">
            <div class="header-left">
                <div class="site-logo">
                    <img src="img/logo.jpg" alt="网站Logo" class="logo-image">
                </div>                <div class="site-info">
                    <h1 class="site-title">花月的技术博客</h1>
                    <p class="site-description">Folding was never an option.</p>
                    <div class="site-stats">
                        <span id="busuanzi_container_site_pv">
                            <i class="fas fa-chart-line"></i>
                            总访问 <span id="busuanzi_value_site_pv" class="site-stat-number">0</span> 次
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容区域 -->
    <div class="main-container">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <ul class="sidebar-categories" id="sidebarCategories">
                    <!-- 分类将通过JavaScript动态生成 -->
                </ul>
            </nav>
        </aside>

        <div class="content-wrapper">
            <div class="content-layout">
                <div class="article-container">                    <section id="welcomeSection" class="welcome-section">
                        <article class="article-content blog-intro">                            <div class="blog-title-section">
                                <h1>欢迎来到花月的博客</h1>
                                <a href="https://github.com/kachofugetsu09/kachofugetsu09.github.io" target="_blank" class="elegant-link repo-link">博客源码</a>
                            </div>
                            <div class="blog-intro-text">
                                <p>你好！我是花月，一位热衷于探索技术深度的软件开发者。</p>
                            </div>

                            <div class="blog-content">
                                <p>在这里，我专注于分享深度技术文章，将复杂的技术问题转化为清晰的知识讲解。每一篇文章都力求准确、深入且易懂。</p>                                <h3>推荐阅读</h3>
                                <p><a href="#" onclick="handleArticleClick('tech/零拷贝技术解析.md', event)" class="elegant-link internal">零拷贝技术解析</a></p>


                            </div><div class="social-links">
                                <a href="https://github.com/kachofugetsu09" target="_blank" class="social-link github-link" title="访问我的GitHub主页">
                                    <img src="img/githubImg.jpg" alt="GitHub" class="github-avatar">
                                    <span>Follow me on GitHub</span>
                                </a>
                            </div>
                        </article>
                    </section>
                    <div id="dynamicContent">
                        <!-- 文章内容将在这里动态加载 -->
                    </div>
                </div>
                
                <div class="toc-container">
                    <div class="toc-wrapper">
                        <div class="toc-header">
                            <h3>文章目录</h3>
                        </div>
                        <nav class="toc-nav">
                            <ul class="toc-list" id="tocList">
                                <!-- 目录将通过JavaScript动态生成 -->
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2025 花月的技术博客. All rights reserved.</p>
        </div>
    </footer>

    <style>
    /* 隐藏不蒜子计数器，直到加载完成 */
    #busuanzi_container_site_pv {
        display: none;
    }
    .busuanzi-loaded #busuanzi_container_site_pv {
        display: inline;
    }
    </style>
    <script>
    // 检查不蒜子计数器是否加载完成
    var checkBusuanzi = setInterval(function() {
        if (typeof BUSUANZI !== 'undefined') {
            document.body.classList.add('busuanzi-loaded');
            clearInterval(checkBusuanzi);
        }
    }, 100);
    </script>
</body>
</html>
